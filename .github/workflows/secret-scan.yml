name: Secret scan (gitleaks)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least-privilege: gitleaks only needs to read the repo contents.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can diff against the base
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
