name: Secret scan (gitleaks)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least-privilege: gitleaks only needs to read the repo contents.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    env:
      # Run the open-source gitleaks CLI directly. The gitleaks-action wrapper
      # requires a paid license on GitHub org repos; the CLI binary does not.
      # Pinned by version + sha256 for supply-chain integrity (see checksums at
      # https://github.com/gitleaks/gitleaks/releases).
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned gitleaks (checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "$tarball" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan the checked-out tree for secrets
        run: gitleaks dir --redact --exit-code 1 .
